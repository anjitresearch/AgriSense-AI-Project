# ==============================================================
#  Mosquitto MQTT Broker Configuration — AgriSense-AI™
#  Supports:
#    - Plain MQTT on port 1883 (for TERRA-NODE™, SKYWATCH-H™)
#    - WebSocket MQTT on port 9001 (for React dashboard)
#
#  Place this file at: ./mosquitto/mosquitto.conf
#  Mounted by docker-compose.yml
# ==============================================================

# ── Allow anonymous connections (use ACL file in production) ──
allow_anonymous true

# ── Standard MQTT TCP listener ─────────────────────────────────
listener 1883
protocol mqtt

# ── WebSocket listener for browser dashboard ──────────────────
listener 9001
protocol websockets

# ── Persistence ────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# ── Message size limit ─────────────────────────────────────────
# Increase if drone images embedded in MQTT payloads (not recommended)
max_packet_size 65536
