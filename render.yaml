databases:
  - name: agrisense-db
    plan: free

services:
  # ────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ────────────────────────────────────────────────────────
  
  # redis is now 'keyvalue' inside services
  - type: keyvalue
    name: agrisense-redis
    plan: free
    ipAllowList: [] # Private access only

  # Mosquitto (MQTT) - MUST be pserv to handle TCP
  # NOTE: Private Services do NOT have a Free plan (defaults to Starter)
  - type: pserv
    name: agrisense-mqtt
    runtime: docker
    dockerfile_path: mosquitto/Dockerfile

  # InfluxDB - Using 'web' to allow Free plan
  - type: web
    name: agrisense-influxdb
    runtime: image
    image: influxdb:2.7
    plan: free
    envVars:
      - key: DOCKER_INFLUXDB_INIT_MODE
        value: setup
      - key: DOCKER_INFLUXDB_INIT_USERNAME
        sync: false
      - key: DOCKER_INFLUXDB_INIT_PASSWORD
        sync: false
      - key: DOCKER_INFLUXDB_INIT_ORG
        sync: false
      - key: DOCKER_INFLUXDB_INIT_BUCKET
        sync: false
      - key: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
        sync: false

  # ────────────────────────────────────────────────────────
  # MICROSERVICES (All set to 'web' for Free Tier)
  # ────────────────────────────────────────────────────────
  - type: web
    name: agrisense-orchestrator
    runtime: docker
    dockerfile_path: orchestrator/Dockerfile
    plan: free
    envVars:
      - key: MQTT_BROKER
        value: agrisense-mqtt
      - key: INFLUX_URL
        value: http://agrisense-influxdb:8086
      - key: POSTGRES_DSN
        fromDatabase:
          name: agrisense-db
          property: connectionString
      - key: EDGE_BRAIN_URL
        value: http://agrisense-edge-brain:8001
      - key: NUTRA_SPEC_URL
        value: http://agrisense-nutra-spec:8002
      - key: CHAIN_PROOF_URL
        value: http://agrisense-chain-proof:8003/api/v1
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  - type: web
    name: agrisense-edge-brain
    runtime: docker
    dockerfile_path: edge_brain/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8001

  - type: web
    name: agrisense-nutra-spec
    runtime: docker
    dockerfile_path: edge_brain/Dockerfile
    plan: free
    startCommand: uvicorn nutra_spec_api:app --host 0.0.0.0 --port 8002

  - type: web
    name: agrisense-chain-proof
    runtime: docker
    dockerfile_path: chain_proof/api/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8003

  # Dashboard - Static site is type: web + runtime: static
  - type: web
    name: agrisense-dashboard
    runtime: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: ./dashboard/dist
