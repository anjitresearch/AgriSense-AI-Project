services:
  # ────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ────────────────────────────────────────────────────────
  - type: redis
    name: agrisense-redis
    ipAllowList: [] # Private access only

  - type: web
    name: agrisense-mqtt
    env: docker
    dockerfile_path: ./mosquitto/Dockerfile # Assuming we need a custom build for config
    plan: free
    healthCheckPath: /
    ports:
      - port: 1883
        protocol: TCP
      - port: 9001
        protocol: TCP

  - type: web
    name: agrisense-influxdb
    image: influxdb:2.7
    envVars:
      - key: DOCKER_INFLUXDB_INIT_MODE
        value: setup
      - key: DOCKER_INFLUXDB_INIT_USERNAME
        fromEnvVar: INFLUX_ADMIN_USER
      - key: DOCKER_INFLUXDB_INIT_PASSWORD
        fromEnvVar: INFLUX_ADMIN_PASS
      - key: DOCKER_INFLUXDB_INIT_ORG
        fromEnvVar: INFLUX_ORG
      - key: DOCKER_INFLUXDB_INIT_BUCKET
        fromEnvVar: INFLUX_BUCKET
      - key: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
        fromEnvVar: INFLUX_TOKEN

  # ────────────────────────────────────────────────────────
  # MICROSERVICES
  # ────────────────────────────────────────────────────────
  - type: web
    name: agrisense-orchestrator
    buildFilter:
      paths:
        - orchestrator/**
    env: docker
    dockerContext: .
    dockerfile_path: orchestrator/Dockerfile
    envVars:
      - key: MQTT_BROKER
        value: agrisense-mqtt
      - key: INFLUX_URL
        value: http://agrisense-influxdb:8086
      - key: POSTGRES_DSN
        fromDatabase:
          name: agrisense-db
          property: connectionString
      - key: EDGE_BRAIN_URL
        value: http://agrisense-edge-brain:8001
      - key: NUTRA_SPEC_URL
        value: http://agrisense-nutra-spec:8002
      - key: CHAIN_PROOF_URL
        value: http://agrisense-chain-proof:8003/api/v1
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  - type: web
    name: agrisense-edge-brain
    env: docker
    dockerfile_path: edge_brain/Dockerfile
    envVars:
      - key: PORT
        value: 8001

  - type: web
    name: agrisense-nutra-spec
    env: docker
    dockerfile_path: edge_brain/Dockerfile # Shares build context
    startCommand: uvicorn nutra_spec_api:app --host 0.0.0.0 --port 8002

  - type: web
    name: agrisense-chain-proof
    env: docker
    dockerfile_path: chain_proof/api/Dockerfile
    envVars:
      - key: PORT
        value: 8003

  - type: web
    name: agrisense-dashboard
    env: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/dist

databases:
  - name: agrisense-db
    plan: free
