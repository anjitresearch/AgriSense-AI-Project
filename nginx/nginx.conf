events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # ── Dashboard (React Frontend) ──
        location / {
            proxy_pass http://dashboard:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── TERRA-NODE / Ingester API (Optional REST layer if needed) ──
        location /api/soil {
            # Route to orchestrator or specific soil API if exposed via HTTP
            proxy_pass http://orchestrator:8000;
        }

        # ── EDGE-BRAIN (Disease Detection) ──
        location /api/detect {
            proxy_pass http://edge-brain:8001;
        }

        # ── NUTRA-SPEC (Phytochemical Prediction) ──
        location /api/nutra {
            proxy_pass http://nutra-spec:8002;
        }

        # ── CHAIN-PROOF (Fabric Gateway) ──
        location /api/chain {
            proxy_pass http://chain-proof:8003;
        }
    }
}
